services:
  landing:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Se toman del .env junto al compose en el server.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://taller.341boxes.ar}
        NEXT_PUBLIC_TURNERO_API_KEY: ${NEXT_PUBLIC_TURNERO_API_KEY:-}
    container_name: boxes341_landing
    restart: unless-stopped
    # Publica el server de Next en el puerto del host (default 3001).
    # aaPanel reverse-proxea 341boxes.ar -> 127.0.0.1:3001
    ports:
      - "${LANDING_PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
